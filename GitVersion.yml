next-version: 17.0.0
mode: ContinuousDeployment
branches:
  main:
    regex: ^main$
    tag: ''
    increment: Patch
    prevent-increment-of-merged-branch-version: true
    is-release-branch: true
  develop:
    regex: ^develop$
    tag: beta
    increment: Minor
    prevent-increment-of-merged-branch-version: false
  feature:
    regex: ^feature[/-]
    tag: alpha.{BranchName}
    increment: Inherit
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    tag: PullRequest
    increment: Inherit
  hotfix:
    regex: ^hotfix[/-]
    tag: beta
    increment: Patch
